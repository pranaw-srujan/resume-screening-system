{% extends "base.html" %}
{% block title %}Job Description{% endblock %}
{% block content %}

<h2 class="mb-4">Enter Job Description</h2>

<div class="card p-4">
    <form action="/job-description" method="POST">
        <div class="mb-3">
            <label for="title" class="form-label">Job Title</label>
            <input type="text" name="title" id="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Job Description</label>
            <textarea name="description" id="description" rows="8" class="form-control"
                placeholder="Paste or type the full job description here..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Job Description</button>
    </form>
</div>

{% if message %}
    <div class="alert {% if 'Failed' in message %}alert-danger{% else %}alert-success{% endif %} mt-4">
        {{ message }}
    </div>
{% endif %}

{% endblock %}
